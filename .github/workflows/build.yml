name: Build and Release FL ToolKit
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
      - name: Change App ID
        run: sed -i 's/applicationId ".*"/applicationId "com.example.chess"/' app/build.gradle
      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FL-ToolKit-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FL-ToolKit-release
          path: app/build/outputs/apk/release/app-release.apk
      - name: Create and push git tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ github.run_number }}"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.run_number }}
          name: "FL ToolKit Build ${{ github.run_number }}"
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          body: |
            ## FL ToolKit — Automated Build ${{ github.run_number }}
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            > The release APK is **unsigned**.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
